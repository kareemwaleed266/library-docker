server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/auth_db
    username: ${POSTGRES_USER:library_user}
    password: ${POSTGRES_PASSWORD:library_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:library-management-system-secret-key-for-development-only-change-in-production}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}

seed:
  admin:
    enabled: ${SEED_ADMIN_ENABLED:true}
    full-name: ${SEED_ADMIN_FULL_NAME:System Administrator}
    email: ${SEED_ADMIN_EMAIL:admin@library.com}
    phone: ${SEED_ADMIN_PHONE:01000000000}
    password: ${SEED_ADMIN_PASSWORD:Admin@123456}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
