services:
  - type: web
    name: library-config-server
    runtime: docker
    rootDir: services/config-server
    plan: free
    envVars:
      - key: SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS
        value: file:/config-repo

  - type: web
    name: library-discovery-server
    runtime: docker
    rootDir: services/discovery-server
    plan: free
    envVars:
      - key: CONFIG_SERVER_URL
        value: https://library-config-server.onrender.com

  - type: web
    name: library-api-gateway
    runtime: docker
    rootDir: services/api-gateway
    plan: free
    envVars:
      - key: CONFIG_SERVER_URL
        value: https://library-config-server.onrender.com
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://library-discovery-server.onrender.com/eureka/

  - type: web
    name: library-auth-service
    runtime: docker
    rootDir: services/auth-service
    plan: free
    envVars:
      - key: CONFIG_SERVER_URL
        value: https://library-config-server.onrender.com
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://library-discovery-server.onrender.com/eureka/

  - type: web
    name: library-catalog-service
    runtime: docker
    rootDir: services/catalog-service
    plan: free
    envVars:
      - key: CONFIG_SERVER_URL
        value: https://library-config-server.onrender.com
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://library-discovery-server.onrender.com/eureka/
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: library-circulation-service
    runtime: docker
    rootDir: services/circulation-service
    plan: free
    envVars:
      - key: CONFIG_SERVER_URL
        value: https://library-config-server.onrender.com
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://library-discovery-server.onrender.com/eureka/

  - type: web
    name: library-engagement-service
    runtime: docker
    rootDir: services/engagement-service
    plan: free
    envVars:
      - key: CONFIG_SERVER_URL
        value: https://library-config-server.onrender.com
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://library-discovery-server.onrender.com/eureka/

  - type: web
    name: library-report-service
    runtime: docker
    rootDir: services/report-service
    plan: free
    envVars:
      - key: CONFIG_SERVER_URL
        value: https://library-config-server.onrender.com
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://library-discovery-server.onrender.com/eureka/
